name: Publish Kodi Repository

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout addon code
        uses: actions/checkout@v3
        with:
          path: addon

      - name: Set up Repository Structure
        run: |
          mkdir -p repo/plugin.kodi.jiotv
          mkdir -p repo/repository.jiotvdirect
          
          # Use the git tag as the source of truth for the version (v1.1.0 -> 1.1.0)
          VERSION=${GITHUB_REF_NAME#v}
          ADDON_ID="plugin.kodi.jiotv"
          REPO_ID="repository.jiotvdirect"
          
          # 1. Package the main Addon
          mkdir -p temp/$ADDON_ID
          cp -r addon/* temp/$ADDON_ID/
          cd temp
          zip -r ../repo/$ADDON_ID/$ADDON_ID-$VERSION.zip $ADDON_ID -x "*.git*" ".github*" "kodi.log" "mds/*" "test_scripts/*" "repository.jiotvdirect/*"
          cd ..
          
          # 2. Package the Repository Addon
          mkdir -p temp_repo/$REPO_ID
          cp -r addon/repository.jiotvdirect/* temp_repo/$REPO_ID/
          cd temp_repo
          zip -r ../repo/$REPO_ID/$REPO_ID-1.0.0.zip $REPO_ID
          cd ..
          
          # Create copies in root for easy browser access
          cp repo/$REPO_ID/$REPO_ID-1.0.0.zip repo/
          # cp repo/$ADDON_ID/$ADDON_ID-$VERSION.zip repo/
          
          # Copy assets for repo listings
          cp addon/resources/icon.png repo/$ADDON_ID/icon.png || true
          cp addon/resources/fanart.png repo/$ADDON_ID/fanart.png || true
          cp addon/repository.jiotvdirect/icon.png repo/$REPO_ID/icon.png || true
          cp addon/repository.jiotvdirect/fanart.png repo/$REPO_ID/fanart.png || true
          
          # 3. Generate combined addons.xml
          echo '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' > repo/addons.xml
          echo '<addons>' >> repo/addons.xml
          # Add Plugin Addon
          cat addon/addon.xml | sed 's/<?xml.*?>//' >> repo/addons.xml
          # Add Repository Addon
          cat addon/repository.jiotvdirect/addon.xml | sed 's/<?xml.*?>//' >> repo/addons.xml
          echo '</addons>' >> repo/addons.xml
          
          # Generate MD5
          md5sum repo/addons.xml | cut -d ' ' -f 1 > repo/addons.xml.md5

          # 4. Generate landing page
          cat <<EOF > repo/index.html
          <!DOCTYPE html>
          <html>
          <head>
              <title>JioTV Direct Kodi Repository</title>
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <style>
                  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; line-height: 1.6; color: #333; max-width: 800px; margin: 0 auto; padding: 40px 20px; background: #f4f7f6; }
                  .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); text-align: center; }
                  img.logo { width: 120px; height: 120px; border-radius: 20px; margin-bottom: 20px; }
                  h1 { margin: 0 0 10px; color: #2c3e50; }
                  .version { color: #7f8c8d; font-size: 0.9em; margin-bottom: 30px; }
                  .btn { background: #27ae60; color: white !important; padding: 12px 25px; border-radius: 5px; text-decoration: none; font-weight: bold; display: inline-block; margin: 10px; transition: background 0.2s; }
                  .btn:hover { background: #219150; }
                  .btn-repo { background: #2980b9; }
                  .btn-repo:hover { background: #2471a3; }
                  .url-box { background: #edf2f7; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 1.1em; margin: 20px 0; border: 1px dashed #cbd5e0; word-break: break-all; }
                  .instructions { text-align: left; margin-top: 40px; }
                  h2 { color: #2c3e50; border-bottom: 2px solid #edf2f7; padding-bottom: 10px; }
                  ol { padding-left: 20px; }
                  li { margin-bottom: 10px; }
              </style>
          </head>
          <body>
              <div class="card">
                  <img src="plugin.kodi.jiotv/icon.png" class="logo" alt="JioTV Direct Icon">
                  <h1>JioTV Direct</h1>
                  <div class="version">Latest Release: v$VERSION</div>
                  <p>Welcome to the official JioTV Direct repository.</p>
                  
                  <div style="margin: 30px 0;">
                      <p><strong>Recommended:</strong> Install the Repository to get automatic updates.</p>
                      <a href="$REPO_ID-1.0.0.zip" class="btn btn-repo">Download Repository ZIP</a>
                      <!-- <br>
                      <small>or <a href="$ADDON_ID-$VERSION.zip">Download Plugin ZIP only</a></small> -->
                  </div>

                  <h2>Kodi Source URL</h2>
                  <p>Add this URL to your Kodi File Manager:</p>
                  <div class="url-box">https://dineshintry.github.io/plugin.kodi.jiotv/</div>
                  
                  <div class="instructions">
                      <h2>Installation Steps</h2>
                      <ol>
                          <li>In Kodi, go to <strong>Settings</strong> > <strong>File Manager</strong> > <strong>Add Source</strong>.</li>
                          <li>Enter the URL above and name it <code>JioTV Direct Repo</code>.</li>
                          <li>Go to <strong>Settings</strong> > <strong>Add-ons</strong> > <strong>Install from zip file</strong>.</li>
                          <li>Select <code>JioTV Direct Repo</code> and choose <code>$REPO_ID-1.0.0.zip</code>.</li>
                          <li>Once installed, select <strong>Install from repository</strong> > <strong>JioTV Direct Repository</strong> > <strong>Video add-ons</strong> > <strong>JioTV Direct</strong>.</li>
                      </ol>
                  </div>

                  <div style="text-align: left; margin-top: 50px; border-top: 1px solid #edf2f7; padding-top: 20px;">
                      <h3 style="font-size: 0.9em; color: #7f8c8d;">Repository Files:</h3>
                      <ul style="list-style: none; padding: 0; font-family: monospace; font-size: 0.85em;">
                          <li><a href="$REPO_ID-1.0.0.zip">$REPO_ID-1.0.0.zip</a></li>
                          <!-- <li><a href="$ADDON_ID-$VERSION.zip">$ADDON_ID-$VERSION.zip</a></li> -->
                          <li><a href="addons.xml">addons.xml</a></li>
                      </ul>
                  </div>
              </div>
          </body>
          </html>
          EOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./repo
          publish_branch: gh-pages
          force_orphan: true
